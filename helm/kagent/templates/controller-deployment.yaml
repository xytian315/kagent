apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kagent.fullname" . }}-controller
  namespace: {{ include "kagent.namespace" . }}
  labels:
    {{- include "kagent.controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "kagent.controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/controller-configmap.yaml") . | sha256sum }}
        {{- with .Values.controller.podAnnotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "kagent.controller.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.controller.imagePullSecrets | default .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.controller.podSecurityContext | default .Values.podSecurityContext) }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kagent.fullname" . }}-controller
      {{- if and (not .Values.database.postgres.url) (not .Values.database.postgres.urlFile) }}
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.database.postgres.bundled.image }}"
          command:
            - "sh"
            - "-c"
            - |
              timeout=120
              delay=2
              elapsed=0
              until pg_isready -h {{ include "kagent.fullname" . }}-postgresql -p 5432 -U {{ .Values.database.postgres.bundled.user }}; do
                elapsed=$((elapsed + delay))
                if [ "$elapsed" -ge "$timeout" ]; then
                  echo "timed out after ${timeout}s waiting for postgres"
                  exit 1
                fi
                echo "waiting for postgres... (${elapsed}s/${timeout}s)"
                sleep "$delay"
                # simple backoff, cap at 10s
                if [ "$delay" -lt 10 ]; then
                  delay=$((delay + 2))
                fi
              done
              echo "postgres is ready"
      {{- end }}
      {{- if gt (len .Values.controller.volumes) 0 }}
      volumes:
      {{- with .Values.controller.volumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: "{{ .Values.controller.image.registry | default .Values.registry  }}/{{ .Values.controller.image.repository }}:{{ coalesce .Values.tag .Values.controller.image.tag .Chart.Version }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy | default .Values.imagePullPolicy }}
          env:
            - name: KAGENT_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- with .Values.controller.env }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "kagent.fullname" . }}-controller
            {{- with .Values.controller.envFrom }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.controller.service.ports.targetPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          {{- with (.Values.controller.securityContext | default .Values.securityContext) }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
          {{- if gt (len .Values.controller.volumeMounts) 0 }}
          volumeMounts:
            {{- with .Values.controller.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
